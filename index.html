<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech Talks Today</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f0f2f5;
            color: #333;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background-color: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        h1 {
            text-align: center;
            color: #1a73e8;
            margin-bottom: 30px;
        }

        .search-container {
            text-align: center;
            margin-bottom: 30px;
        }

        #searchInput {
            width: 50%;
            padding: 12px 20px;
            border: 1px solid #ccc;
            border-radius: 25px;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        #searchInput:focus {
            outline: none;
            border-color: #1a73e8;
            box-shadow: 0 0 5px rgba(26, 115, 232, 0.5);
        }

        .schedule-item {
            padding: 20px;
            border-left: 4px solid #1a73e8;
            margin-bottom: 20px;
            background-color: #f9f9f9;
            border-radius: 0 8px 8px 0;
        }

        .schedule-item.break {
            border-left-color: #fbbc05;
        }

        .schedule-item.lunch {
            border-left-color: #34a853;
        }

        .schedule-time {
            font-weight: bold;
            font-size: 1.1em;
            margin-bottom: 10px;
        }

        .talk-title {
            font-size: 1.4em;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .talk-speakers {
            font-style: italic;
            margin-bottom: 15px;
        }

        .talk-categories {
            margin-bottom: 15px;
        }

        .category-tag {
            display: inline-block;
            background-color: #e0e0e0;
            color: #555;
            padding: 5px 10px;
            border-radius: 15px;
            font-size: 0.9em;
            margin-right: 5px;
        }

        .talk-description {
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Tech Talks Today</h1>
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Search by category...">
        </div>
        <div id="schedule"></div>
    </div>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const scheduleContainer = document.getElementById('schedule');
            const searchInput = document.getElementById('searchInput');
            const talks = [
              {
                "title": "The Future of Artificial Intelligence",
                "speakers": ["Dr. Evelyn Reed"],
                "categories": ["AI", "Machine Learning"],
                "duration": 60,
                "description": "A deep dive into the latest advancements in AI and what we can expect in the coming years."
              },
              {
                "title": "Building Scalable Web Applications",
                "speakers": ["John Smith", "Jane Doe"],
                "categories": ["Web Development", "Scalability"],
                "duration": 60,
                "description": "Learn the best practices for designing and building web applications that can handle millions of users."
              },
              {
                "title": "The Rise of Quantum Computing",
                "speakers": ["Dr. Kenji Tanaka"],
                "categories": ["Quantum Computing", "Physics"],
                "duration": 60,
                "description": "An introduction to the mind-bending world of quantum computing and its potential to revolutionize technology."
              },
              {
                "title": "Cybersecurity in the Modern Age",
                "speakers": ["Alex Chen"],
                "categories": ["Cybersecurity", "Networking"],
                "duration": 60,
                "description": "Discover the latest threats and defense mechanisms in the ever-evolving landscape of cybersecurity."
              },
              {
                "title": "The Power of Data Visualization",
                "speakers": ["Maria Garcia"],
                "categories": ["Data Science", "Visualization"],
                "duration": 60,
                "description": "Learn how to turn complex data into beautiful and intuitive visualizations that tell a story."
              },
              {
                "title": "Exploring the Cosmos with Modern Telescopes",
                "speakers": ["Dr. Ben Carter", "Dr. Olivia Martinez"],
                "categories": ["Astronomy", "Technology"],
                "duration": 60,
                "description": "A journey through the stars as we explore the latest discoveries made possible by modern telescopes."
              }
            ];

            renderSchedule(talks);

            searchInput.addEventListener('input', () => {
                const searchTerm = searchInput.value.toLowerCase();
                const filteredTalks = talks.filter(talk => 
                    talk.categories.some(category => category.toLowerCase().includes(searchTerm))
                );
                renderSchedule(filteredTalks);
            });

            function renderSchedule(talksToRender) {
                scheduleContainer.innerHTML = '';
                let currentTime = new Date();
                currentTime.setHours(10, 0, 0, 0); // Event starts at 10:00 AM

                const formatTime = (date) => {
                    return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                };

                let talkCounter = 0;
                talksToRender.forEach((talk, index) => {
                    if (talkCounter === 3) {
                        const lunchBreak = document.createElement('div');
                        lunchBreak.className = 'schedule-item lunch';
                        const lunchStartTime = new Date(currentTime);
                        currentTime.setHours(currentTime.getHours() + 1);
                        const lunchEndTime = new Date(currentTime);
                        lunchBreak.innerHTML = `
                            <div class="schedule-time">${formatTime(lunchStartTime)} - ${formatTime(lunchEndTime)}</div>
                            <div class="talk-title">Lunch Break</div>
                        `;
                        scheduleContainer.appendChild(lunchBreak);

                        // Add transition after lunch
                        const transitionAfterLunch = document.createElement('div');
                        transitionAfterLunch.className = 'schedule-item break';
                        const transitionStartTime = new Date(currentTime);
                        currentTime.setMinutes(currentTime.getMinutes() + 10);
                        const transitionEndTime = new Date(currentTime);
                        transitionAfterLunch.innerHTML = `
                            <div class="schedule-time">${formatTime(transitionStartTime)} - ${formatTime(transitionEndTime)}</div>
                            <div class="talk-title">Transition</div>
                        `;
                        scheduleContainer.appendChild(transitionAfterLunch);
                    }

                    const talkStartTime = new Date(currentTime);
                    currentTime.setMinutes(currentTime.getMinutes() + talk.duration);
                    const talkEndTime = new Date(currentTime);

                    const talkElement = document.createElement('div');
                    talkElement.className = 'schedule-item';
                    talkElement.innerHTML = `
                        <div class="schedule-time">${formatTime(talkStartTime)} - ${formatTime(talkEndTime)}</div>
                        <div class="talk-title">${talk.title}</div>
                        <div class="talk-speakers">${talk.speakers.join(', ')}</div>
                        <div class="talk-categories">
                            ${talk.categories.map(category => `<span class="category-tag">${category}</span>`).join('')}
                        </div>
                        <div class="talk-description">${talk.description}</div>
                    `;
                    scheduleContainer.appendChild(talkElement);

                    if (index < talksToRender.length - 1) {
                        const transitionElement = document.createElement('div');
                        transitionElement.className = 'schedule-item break';
                        const transitionStartTime = new Date(currentTime);
                        currentTime.setMinutes(currentTime.getMinutes() + 10);
                        const transitionEndTime = new Date(currentTime);
                        transitionElement.innerHTML = `
                            <div class="schedule-time">${formatTime(transitionStartTime)} - ${formatTime(transitionEndTime)}</div>
                            <div class="talk-title">Transition</div>
                        `;
                        scheduleContainer.appendChild(transitionElement);
                    }
                    talkCounter++;
                });
            }
        });
    </script>
</body>
</html>
